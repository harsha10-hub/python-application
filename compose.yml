---
services:
  db:
    image: harsha0310/pyapp:db_image
    deploy:
      replicas: 1
    ports:
      - "3306:3306"
    networks:
      - mynetwork
      
  auth_service:
    image: harsha0310/pyapp:auth_image
    deploy:
      replicas: 1
    ports:
      - "5001:5001"
    networks:
      - mynetwork
    depends_on:
      - db
    
  book_service:
    image: harsha0310/pyapp:book_image
    deploy:
      replicas: 1
    ports:
      - "5002:5002"
    networks:
      - mynetwork
    depends_on:
      - db
    
  borrow_service:
    image: harsha0310/pyapp:borrow_image
    deploy:
      replicas: 1
    ports:
      - "5003:5003"
    networks:
      - mynetwork
    depends_on:
      - db
    
  frontend:
    image: harsha0310/pyapp:frontend
    deploy:
      replicas: 1
    ports:
      - "5000:5000"
    networks:
      - mynetwork
    depends_on:
      - auth
      - book
      - borrow
networks:
  mynetwork:
    driver: overlay


